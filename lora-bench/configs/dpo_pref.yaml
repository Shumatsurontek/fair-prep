# DPO on math preference dataset.

dataset:
  name: "xinlai/Math-Step-DPO-10K"
  train_split: "train"
  prompt_field: "prompt"
  chosen_field: "chosen"
  rejected_field: "rejected"
  max_train_samples: 2000           # reduce for MPS feasibility
  eval_holdout: 100

train:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 16
  learning_rate: 3.0e-6             # DPO sensitive, lower than SFT
  lr_scheduler_type: "cosine"
  warmup_steps: 30
  weight_decay: 0.0
  max_grad_norm: 0.5
  optim: "adamw_torch"
  logging_steps: 20
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  bf16: true
  fp16: false
  report_to: "tensorboard"
  gradient_checkpointing: false

dpo:
  beta: 0.1
  loss_type: "sigmoid"
  max_length: 1024

early_stopping:
  patience: 3
  threshold: 0.0

sft_checkpoint: "./runs/qwen3_06b_sft_gsm8k/final"
run_name: "qwen3_06b_dpo_math"
